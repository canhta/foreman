# ─── Messaging Channel ────────────────────────────────
# Bidirectional WhatsApp channel for commands and ticket creation.
# Omit [channel] entirely to disable.

# [channel]
# provider = "whatsapp"
#
# [channel.whatsapp]
# session_db      = "~/.foreman/whatsapp.db"
# pairing_mode    = "code"           # code | qr
# dm_policy       = "allowlist"      # allowlist | pairing
# allowed_numbers = ["+84123456789"] # E.164 format

# ─── MCP Servers ──────────────────────────────────────
# Connect Foreman's builtin agent to external MCP servers via stdin/stdout.

# [mcp]
# resource_max_bytes = 524288   # Max bytes per MCP resource read (default: 512 KB)

# [[mcp.servers]]
# name    = "internal-db"
# command = "npx"
# args    = ["-y", "@company/db-mcp-server"]
# allowed_tools          = ["query", "schema"]
# restart_policy         = "on-failure"
# max_restarts           = 3
# restart_delay_secs     = 2
# health_check_interval_secs = 30
# [mcp.servers.env]
# DB_URL = "${DATABASE_URL}"

# ─── Skills Agent Runner ────────────────────────────────
# Which runner backs the "agentsdk" step type in YAML skills.
# Options: builtin (default) | claudecode | copilot

[skills.agent_runner]
provider = "builtin"

# Separate cost cap for skill agent calls — does NOT draw from the core pipeline budget.
max_cost_per_ticket_usd = 2.00
max_turns_default = 10
timeout_secs_default = 120

[skills.agent_runner.builtin]
default_allowed_tools = ["Read", "Glob", "Grep"]
# model = "claude-sonnet-4-6"           # optional: override model for all builtin agent sessions (REQ-LOOP-005)
                                         # when unset, falls back to the pipeline implementer model

[skills.agent_runner.claudecode]
bin = "claude"                  # resolved via $PATH if relative
default_allowed_tools = ["Read", "Edit", "Glob", "Grep", "Bash"]
max_turns_default = 10
timeout_secs_default = 180
max_budget_usd = 2.00
# model = "sonnet"             # optional: override default model

[skills.agent_runner.copilot]
cli_path = "copilot"
github_token = "${GITHUB_TOKEN}"
model = "gpt-4o"
default_allowed_tools = ["Read", "Edit", "Glob", "Grep", "Bash"]
timeout_secs_default = 180

