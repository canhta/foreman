# Foreman Global Configuration Example
# Global config lives at ~/.foreman/config.toml
# Copy to ~/.foreman/config.toml and customize.
# Run `foreman init` to bootstrap interactively.

[daemon]
poll_interval_secs      = 60
idle_poll_interval_secs = 300
log_level               = "info"  # trace | debug | info | warn | error
log_format              = "json"  # json | pretty
lock_ttl_seconds        = 3600

[dashboard]
enabled    = true
port       = 8080           # override: FOREMAN_DASHBOARD_PORT or --dashboard-port
host       = "127.0.0.1"   # override: FOREMAN_DASHBOARD_HOST (use 0.0.0.0 for Docker)
auth_token = "${FOREMAN_DASHBOARD_TOKEN}"

[llm]
default_provider   = "anthropic"
# embedding_provider = ""    # "openai" | "anthropic"
# embedding_model    = ""    # e.g. "text-embedding-3-small"

[llm.anthropic]
api_key = "${ANTHROPIC_API_KEY}"

# [llm.openai]
# api_key = "${OPENAI_API_KEY}"

# [llm.openrouter]
# api_key = "${OPENROUTER_API_KEY}"

# [llm.local]
# base_url = ""

[llm.outage]
fallback_provider      = ""
max_connection_retries = 3
retry_delay_secs       = 5

[cost]
max_cost_per_day_usd    = 150.0
max_cost_per_month_usd  = 3000.0
alert_threshold_percent = 80

[runner]
mode = "local"  # local | docker — global default, overridable per project

[runner.local]
allowed_commands = ["npm", "yarn", "pnpm", "cargo", "go", "pytest", "make", "bun"]
forbidden_paths  = []

[secrets]
enabled        = true
always_exclude = [".env", ".env.*", "*.pem", "*.key", "*.p12"]
extra_patterns = []

[mcp]
resource_max_bytes = 524288   # Max bytes per MCP resource read (default: 512 KB)

